<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrampoHero - Gigs sob demanda</title>
    <meta name="description" content="Plataforma inteligente de marketplace para trabalhos temporários. Conectamos freelancers qualificados a empresas que precisam de mão-de-obra pontual.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="theme-color" content="#4f46e5">
    <link rel="canonical" href="https://app.trampohero.com.br/">

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:title" content="TrampoHero - Gigs sob demanda para empresas e freelancers">
    <meta property="og:description" content="Encontre freelancers qualificados ou publique vagas temporárias com rapidez, segurança e pagamentos protegidos.">
    <meta property="og:site_name" content="TrampoHero">
    <meta property="og:url" content="https://app.trampohero.com.br/">
    <meta property="og:image" content="https://app.trampohero.com.br/icons/icon-512.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TrampoHero - Gigs sob demanda para empresas e freelancers">
    <meta name="twitter:description" content="Publique vagas temporárias e conecte-se com talentos prontos para trabalhar hoje.">
    <meta name="twitter:image" content="https://app.trampohero.com.br/icons/icon-512.png">

    <!-- PWA / mobile-web metadata -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TrampoHero">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TrampoHero",
        "url": "https://app.trampohero.com.br/",
        "inLanguage": "pt-BR",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://app.trampohero.com.br/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TrampoHero",
        "url": "https://app.trampohero.com.br/",
        "logo": "https://app.trampohero.com.br/icons/icon-512.png",
        "sameAs": [
          "https://github.com/tavs-coelho/TrampoHero"
        ]
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .leaflet-container {
            width: 100%;
            height: 100%;
            border-radius: 2rem;
            z-index: 1;
        }
        /* Custom map marker style */
        .hero-marker {
            background: #4f46e5;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .hero-marker:hover {
            transform: scale(1.2);
            background: #4338ca;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <noscript>Para acessar todas as funcionalidades do TrampoHero, ative o JavaScript no seu navegador.</noscript>
    <div id="root"></div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Vite entry point (bundled build) -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
